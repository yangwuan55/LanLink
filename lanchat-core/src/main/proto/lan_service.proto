syntax = "proto3";
option java_package = "com.ymr.lancomm.proto";
option java_multiple_files = true;

message LanMessage {
  string id = 1;
  int64 timestamp = 2;
  bytes payload = 3;
  int32 type = 4;
}

message AuthRequest {
  string device_name = 1;
  bytes credentials = 2;
  bytes custom_data = 3;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
  bytes custom_data = 3;
}

message ConnectionStatus {
  bool connected = 1;
  string peer_name = 2;
}