syntax = "proto3";
option java_package = "com.example.lanchat.proto";
option java_multiple_files = true;

message LanMessage {
  string id = 1;
  int64 timestamp = 2;
  string payload = 3;
}

message AuthRequest {
  string device_name = 1;
  bytes credentials = 2;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
}

message ConnectionStatus {
  bool connected = 1;
  string peer_name = 2;
}